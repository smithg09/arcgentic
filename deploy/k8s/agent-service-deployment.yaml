apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: arcgentic
  labels:
    app.kubernetes.io/name: agent-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-service
    spec:
      serviceAccountName: agent-service
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent-service
          image: __AGENT_SERVICE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
          envFrom:
            - secretRef:
                name: agent-service-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
