apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: user-service-env
  namespace: arcgentic
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: user-service-env
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_URI
      remoteRef:
        key: arcgentic/prod/user-service
        property: POSTGRES_URI
    - secretKey: POSTGRES_DATABASE
      remoteRef:
        key: arcgentic/prod/user-service
        property: POSTGRES_DATABASE
    - secretKey: MIGRATE_DATABASE_URL
      remoteRef:
        key: arcgentic/prod/user-service
        property: MIGRATE_DATABASE_URL
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-service-env
  namespace: arcgentic
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: agent-service-env
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: arcgentic/prod/agent-service
        property: DATABASE_URL
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: arcgentic/prod/agent-service
        property: OPENAI_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: arcgentic/prod/agent-service
        property: ANTHROPIC_API_KEY
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: arcgentic/prod/agent-service
        property: GOOGLE_API_KEY
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: arcgentic/prod/agent-service
        property: OPENROUTER_API_KEY
    - secretKey: OPENAI_MODEL
      remoteRef:
        key: arcgentic/prod/agent-service
        property: OPENAI_MODEL
    - secretKey: ANTHROPIC_MODEL
      remoteRef:
        key: arcgentic/prod/agent-service
        property: ANTHROPIC_MODEL
    - secretKey: GEMINI_MODEL
      remoteRef:
        key: arcgentic/prod/agent-service
        property: GEMINI_MODEL
    - secretKey: OPENROUTER_MODEL
      remoteRef:
        key: arcgentic/prod/agent-service
        property: OPENROUTER_MODEL
