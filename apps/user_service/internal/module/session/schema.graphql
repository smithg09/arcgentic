type Session @goModel(model: "github.com/smithg09/core/internal/module/session.Session") {
  session_id: Uuid! @goField(name: "SessionID")
  user_id: Uuid! @goField(name: "UserID")
  is_marked_completed: Boolean! @goField(name: "IsMarkedCompleted")
  created_at: Time!
  updated_at: Time!
}

input CreateSessionDto @goModel(model: "github.com/smithg09/core/internal/module/session.CreateDto") {
  user_id: Uuid! @goField(name: "UserID")
  is_marked_completed: Boolean @goField(name: "IsMarkedCompleted")
}

input WhereSessionsDto @goModel(model: "github.com/smithg09/core/internal/module/session.WhereDto") {
  user_id: UuidFilter @goField(name: "UserID")
  is_marked_completed: Boolean @goField(name: "IsMarkedCompleted")
  sort: SortFilter
  pagination: PaginationFilter
}

input UpdateSessionDto @goModel(model: "github.com/smithg09/core/internal/module/session.UpdateDto") {
  user_id: Uuid @goField(name: "UserID")
  is_marked_completed: Boolean @goField(name: "IsMarkedCompleted")
}

extend type Query {
  getSession(id: Uuid!): Session
  listSessions(where: WhereSessionsDto): [Session!]!
}

extend type Mutation {
  createSession(data: CreateSessionDto!): Session
  updateSession(id: Uuid!, data: UpdateSessionDto!): Session
}