type User @goModel(model: "github.com/smithg09/core/internal/module/user.User") {
  id: Uuid!
  name: String!
  email: String!
  professional_role: String! @goField(name: "ProfessionalRole")
  llm_preferences: String! @goField(name: "LlmPreferences")
  created_at: Time!
  updated_at: Time!
}

input CreateUserDto @goModel(model: "github.com/smithg09/core/internal/module/user.CreateDto") {
  name: String!
  email: String!
  professional_role: String! @goField(name: "ProfessionalRole")
  llm_preferences: String @goField(name: "LlmPreferences")
}

input UpdateUserDto @goModel(model: "github.com/smithg09/core/internal/module/user.UpdateDto") {
  name: String
  email: String
  professional_role: String @goField(name: "ProfessionalRole")
  llm_preferences: String @goField(name: "LlmPreferences")
}

extend type Query {
  getUser(id: Uuid!): User
  listUsers: [User!]!
}

extend type Mutation {
  createUser(data: CreateUserDto!): User
  updateUser(id: Uuid!, data: UpdateUserDto!): User
  deleteUser(id: Uuid!): Boolean
}