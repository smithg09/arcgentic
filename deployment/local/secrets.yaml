apiVersion: v1
kind: Secret
metadata:
  name: user-service-env
  namespace: arcgentic
type: Opaque
stringData:
  POSTGRES_URI: "postgresql://arcgentic:arcgentic@postgres:5432"
  POSTGRES_DATABASE: "arcgentic"
  MIGRATE_DATABASE_URL: "postgres://arcgentic:arcgentic@postgres:5432/arcgentic?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-service-env
  namespace: arcgentic
type: Opaque
stringData:
  DATABASE_URL: "postgresql://arcgentic:arcgentic@postgres:5432/arcgentic"
  # ──────────────────────────────────────────────────────
  # Fill in at least one real API key below.
  # You can also use envsubst to inject from environment:
  #   envsubst < deployment/local/secrets.yaml | kubectl apply -f -
  # ──────────────────────────────────────────────────────
