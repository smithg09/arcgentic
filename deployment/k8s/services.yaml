apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: arcgentic
spec:
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: arcgentic
spec:
  selector:
    app.kubernetes.io/name: agent-service
  ports:
    - name: http
      port: 5001
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: arcgentic
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: http
