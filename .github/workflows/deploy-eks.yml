name: Deploy to Amazon EKS

on:
  push:
    branches:
      - aws-eks-deployment
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  APP_HOST: ${{ vars.APP_HOST }}
  ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}
  ECR_WEB_REPOSITORY: arcgentic-web
  ECR_USER_SERVICE_REPOSITORY: arcgentic-user-service
  ECR_AGENT_SERVICE_REPOSITORY: arcgentic-agent-service
  ECR_USER_SERVICE_MIGRATE_REPOSITORY: arcgentic-user-service-migrate

jobs:
  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "$AWS_REGION"
          test -n "$EKS_CLUSTER_NAME"
          test -n "$APP_HOST"
          test -n "$ACM_CERTIFICATE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in \
            "$ECR_WEB_REPOSITORY" \
            "$ECR_USER_SERVICE_REPOSITORY" \
            "$ECR_AGENT_SERVICE_REPOSITORY" \
            "$ECR_USER_SERVICE_MIGRATE_REPOSITORY"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true \
                --encryption-configuration encryptionType=AES256 >/dev/null
          done

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push user service image
        id: build-user-service
        uses: docker/build-push-action@v6
        with:
          context: apps/user_service
          file: apps/user_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_USER_SERVICE_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_USER_SERVICE_REPOSITORY }}:latest
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,mode=max,scope=user-service

      - name: Build and push user service migration image
        id: build-user-service-migrate
        uses: docker/build-push-action@v6
        with:
          context: apps/user_service
          file: apps/user_service/Dockerfile.migrate
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_USER_SERVICE_MIGRATE_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_USER_SERVICE_MIGRATE_REPOSITORY }}:latest
          cache-from: type=gha,scope=user-service-migrate
          cache-to: type=gha,mode=max,scope=user-service-migrate

      - name: Build and push agent service image
        id: build-agent-service
        uses: docker/build-push-action@v6
        with:
          context: apps/agent_service
          file: apps/agent_service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_AGENT_SERVICE_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_AGENT_SERVICE_REPOSITORY }}:latest
          cache-from: type=gha,scope=agent-service
          cache-to: type=gha,mode=max,scope=agent-service

      - name: Set image digests
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "WEB_IMAGE=${ECR_REGISTRY}/${ECR_WEB_REPOSITORY}@${{ steps.build-web.outputs.digest }}"
            echo "USER_SERVICE_IMAGE=${ECR_REGISTRY}/${ECR_USER_SERVICE_REPOSITORY}@${{ steps.build-user-service.outputs.digest }}"
            echo "USER_SERVICE_MIGRATE_IMAGE=${ECR_REGISTRY}/${ECR_USER_SERVICE_MIGRATE_REPOSITORY}@${{ steps.build-user-service-migrate.outputs.digest }}"
            echo "AGENT_SERVICE_IMAGE=${ECR_REGISTRY}/${ECR_AGENT_SERVICE_REPOSITORY}@${{ steps.build-agent-service.outputs.digest }}"
          } >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl for EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Render Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          cp -R deploy/k8s /tmp/arcgentic-k8s
          perl -pi -e 's#__AWS_REGION__#$ENV{AWS_REGION}#g;
                       s#__ACM_CERTIFICATE_ARN__#$ENV{ACM_CERTIFICATE_ARN}#g;
                       s#__APP_HOST__#$ENV{APP_HOST}#g;
                       s#__WEB_IMAGE__#$ENV{WEB_IMAGE}#g;
                       s#__USER_SERVICE_IMAGE__#$ENV{USER_SERVICE_IMAGE}#g;
                       s#__USER_SERVICE_MIGRATE_IMAGE__#$ENV{USER_SERVICE_MIGRATE_IMAGE}#g;
                       s#__AGENT_SERVICE_IMAGE__#$ENV{AGENT_SERVICE_IMAGE}#g;' /tmp/arcgentic-k8s/*.yaml

      - name: Apply cluster resources and sync secrets
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f /tmp/arcgentic-k8s/namespace.yaml
          kubectl apply -f /tmp/arcgentic-k8s/configmap.yaml
          kubectl apply -f /tmp/arcgentic-k8s/serviceaccounts.yaml
          kubectl apply -f /tmp/arcgentic-k8s/secret-store.yaml
          kubectl apply -f /tmp/arcgentic-k8s/external-secrets.yaml
          kubectl apply -f /tmp/arcgentic-k8s/services.yaml
          kubectl -n arcgentic wait externalsecret/user-service-env --for=condition=Ready --timeout=180s
          kubectl -n arcgentic wait externalsecret/agent-service-env --for=condition=Ready --timeout=180s

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n arcgentic delete job user-service-migrate --ignore-not-found
          kubectl apply -f /tmp/arcgentic-k8s/user-service-migration-job.yaml
          kubectl -n arcgentic wait job/user-service-migrate --for=condition=Complete --timeout=300s

      - name: Deploy applications
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f /tmp/arcgentic-k8s/user-service-deployment.yaml
          kubectl apply -f /tmp/arcgentic-k8s/agent-service-deployment.yaml
          kubectl apply -f /tmp/arcgentic-k8s/web-deployment.yaml
          kubectl apply -f /tmp/arcgentic-k8s/ingress.yaml
          kubectl -n arcgentic rollout status deployment/user-service --timeout=300s
          kubectl -n arcgentic rollout status deployment/agent-service --timeout=300s
          kubectl -n arcgentic rollout status deployment/web --timeout=300s
